name = "evroproekti-dashboard"
main = "worker.js"
# Акаунтът, в който е създадена D1 базата (Office@s2kdesign.com).
account_id = "9c3fcd4952bcf0c295532e9884377d37"
compatibility_date = "2025-05-05"
compatibility_flags = ["nodejs_compat"]

# Билд на статичния сайт преди деплой (важно за Cloudflare Git деплой / Workers Builds).
[build]
command = "npx next build"

# Статичните файлове на дашборда (Next.js export).
# run_worker_first = true: worker-ът се изпълнява ПРЕДИ да се сервира статичен asset,
# за да може редиректът от стария workers.dev адрес да работи и за корена „/" и
# за HTML страниците (иначе те се сервират директно от edge-а и worker-ът не се вика).
[assets]
directory = "./out"
binding = "ASSETS"
run_worker_first = true

# База данни Cloudflare D1 с проследяваните европроекти.
# Обновява се всеки ден от насрочената задача в Claude.
[[d1_databases]]
binding = "DB"
database_name = "evroproekti-dashboard"
database_id = "d5f1bb40-3729-4c11-ae06-efbd4b5c9760"

# Cron Trigger за nightly AI pipeline-а: на всеки 2 мин задвижва чакащите AI jobs
# (time-budgeted driveJobs loop, без дълъг Worker request) и в ~20:xx UTC прави
# fallback nightly старт, ако daily review completion report не е получен. Виж
# worker.js scheduled(). По-честият cron прави pipeline-а видимо самозадвижващ се.
[triggers]
crons = ["*/2 * * * *"]

# ---------------------------------------------------------------------------
# Автентикация (Google OAuth). НЕ слагайте тайни тук — това е под version control.
#
# Публичен, не-таен параметър — каноничният домейн на приложението.
# От него се гради OAuth redirect_uri (…/api/auth/google/callback), затова
# трябва да съвпада с адреса, регистриран в Google Cloud Console.
[vars]
APP_URL = "https://euro-funds.eu"
#
# Тайните се задават с `wrangler secret put`:
#   wrangler secret put GOOGLE_CLIENT_ID
#   wrangler secret put GOOGLE_CLIENT_SECRET
#   wrangler secret put AUTH_SECRET      # дълъг случаен низ, напр. `openssl rand -base64 48`
#
# За ЛОКАЛНА разработка ползвайте .dev.vars (копие на .dev.vars.example).
# ---------------------------------------------------------------------------
